name: agswarm-desktop-release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            target: windows-x64
          - os: macos-13
            target: macos-intel
          - os: macos-14
            target: macos-apple-silicon
    runs-on: ${{ matrix.os }}
    env:
      APP_NAME: AgSwarm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[desktop,nats,desktop-build]"

      - name: Generate app icons from prototype.pen (optional)
        run: |
          python - <<'PY'
          from pathlib import Path
          import subprocess
          import sys

          pen = Path("prototype/prototype.pen")
          if pen.exists():
              print(f"icon source found: {pen}")
              subprocess.run([sys.executable, "scripts/generate_app_icon.py"], check=True)
          else:
              print("prototype/prototype.pen not found, fallback to committed assets/icons")
          PY

      - name: Install create-dmg (macOS)
        if: runner.os == 'macOS'
        run: brew install create-dmg

      - name: Build desktop package
        run: python scripts/build_desktop.py --clean --name ${{ env.APP_NAME }}

      - name: Generate checksums (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $out = "dist-artifacts/SHA256SUMS.txt"
          Remove-Item $out -ErrorAction SilentlyContinue
          Get-ChildItem dist-artifacts -File | ForEach-Object {
            $hash = Get-FileHash $_.FullName -Algorithm SHA256
            "$($hash.Hash.ToLower())  $($_.Name)" | Out-File -FilePath $out -Encoding utf8 -Append
          }

      - name: Generate checksums (macOS)
        if: runner.os == 'macOS'
        run: |
          cd dist-artifacts
          shasum -a 256 * > SHA256SUMS.txt

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ matrix.os }}
          path: |
            dist-artifacts/*.zip
            dist-artifacts/*.dmg
            dist-artifacts/SHA256SUMS.txt
          if-no-files-found: error

  release:
    name: Publish Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Display assets
        run: ls -R release-assets

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/**/*.zip
            release-assets/**/*.dmg
          generate_release_notes: true
