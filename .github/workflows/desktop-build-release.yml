name: agswarm-desktop-release

on:
  pull_request:
    paths:
      - ".github/workflows/desktop-build-release.yml"
      - "desktop/**"
      - "assets/icons/**"
  push:
    branches:
      - main
      - "codex/**"
    tags:
      - "v*"
    paths:
      - ".github/workflows/desktop-build-release.yml"
      - "desktop/**"
      - "assets/icons/**"
  workflow_dispatch:

permissions:
  contents: write

env:
  NODE_VERSION: "22.19.0"
  BUN_VERSION: "1.3.4"

jobs:
  ci:
    name: Desktop CI
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout AgSwarm
        uses: actions/checkout@v4
        with:
          path: s

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: s/desktop/package-lock.json

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            curl \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            pkg-config

      - name: Install desktop dependencies
        working-directory: s/desktop
        run: npm ci

      - name: Typecheck desktop
        working-directory: s/desktop
        run: npm run lint

      - name: Build desktop frontend
        working-directory: s/desktop
        run: npm run build

      - name: Prepare Linux sidecars for Rust check
        working-directory: s/desktop
        env:
          TAURI_SIDECAR_TARGET: x86_64-unknown-linux-gnu
          NODE_VERSION: ${{ env.NODE_VERSION }}
        run: npm run prepare:sidecars -- --target x86_64-unknown-linux-gnu --force --skip-runtime

      - name: Check Linux sidecars for Rust check
        working-directory: s/desktop
        env:
          TAURI_SIDECAR_TARGET: x86_64-unknown-linux-gnu
        run: npm run check:sidecars -- --target x86_64-unknown-linux-gnu --skip-runtime

      - name: Check Rust desktop crate
        working-directory: s/desktop/src-tauri
        env:
          TAURI_SIDECAR_TARGET: x86_64-unknown-linux-gnu
        run: cargo check

  build:
    name: Build ${{ matrix.label }}
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    needs: ci
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS Apple Silicon
            os: macos-15
            sidecar_target: aarch64-apple-darwin
            tauri_args: --target aarch64-apple-darwin
            artifact_name: macOS-Apple-Silicon
            project_path: s/desktop
            artifact_path: s/dist-artifacts/*
          - label: Windows x64
            os: windows-2022
            sidecar_target: x86_64-pc-windows-msvc
            tauri_args: ""
            artifact_name: Windows-x64
            project_path: W:/desktop
            artifact_path: W:/dist-artifacts/*

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout AgSwarm
        uses: actions/checkout@v4
        with:
          path: s

      - name: Map short Windows build path
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          subst W: "${{ github.workspace }}\s"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: s/desktop/package-lock.json

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            curl \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            pkg-config

      - name: Install Rust target for macOS cross-arch
        if: runner.os == 'macOS'
        run: rustup target add ${{ matrix.sidecar_target }}

      - name: Install desktop dependencies
        working-directory: ${{ matrix.project_path }}
        run: npm ci

      - name: Prepare Tauri sidecars
        working-directory: ${{ matrix.project_path }}
        env:
          TAURI_SIDECAR_TARGET: ${{ matrix.sidecar_target }}
          NODE_VERSION: ${{ env.NODE_VERSION }}
        run: npm run prepare:sidecars -- --target ${{ matrix.sidecar_target }} --force

      - name: Check prepared sidecars
        working-directory: ${{ matrix.project_path }}
        env:
          TAURI_SIDECAR_TARGET: ${{ matrix.sidecar_target }}
        run: npm run check:sidecars -- --target ${{ matrix.sidecar_target }}

      - name: Check updater signing secret
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [[ -z "${TAURI_SIGNING_PRIVATE_KEY}" ]]; then
            echo "TAURI_SIGNING_PRIVATE_KEY is required for signed updater artifacts." >&2
            exit 1
          fi

      - name: Build Tauri bundle
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIDECAR_TARGET: ${{ matrix.sidecar_target }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: "-"
        with:
          projectPath: ${{ matrix.project_path }}
          args: ${{ matrix.tauri_args }}

      - name: Collect bundle artifacts
        working-directory: ${{ matrix.project_path }}
        env:
          TAURI_SIDECAR_TARGET: ${{ matrix.sidecar_target }}
        run: npm run collect:artifacts -- --target ${{ matrix.sidecar_target }} --label ${{ matrix.artifact_name }}

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout release notes
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Display assets
        run: find release-assets -maxdepth 4 -type f | sort

      - name: Generate checksums
        run: |
          cd release-assets
          find . -type f ! -name SHA256SUMS.txt -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt

      - name: Check custom release notes
        id: notes
        shell: bash
        run: |
          NOTES_FILE="docs/releases/${GITHUB_REF_NAME}.md"
          if [[ -f "${NOTES_FILE}" ]]; then
            echo "use_custom=true" >> "$GITHUB_OUTPUT"
          else
            echo "use_custom=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate updater manifest
        run: |
          node desktop/scripts/generate-updater-manifest.mjs \
            --assets-dir release-assets \
            --version "${GITHUB_REF_NAME#v}" \
            --tag "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --notes-path "docs/releases/${GITHUB_REF_NAME}.md" \
            --out release-assets/latest.json

      - name: Verify updater release assets
        run: node desktop/scripts/verify-release-assets.mjs --assets-dir release-assets

      - name: Publish GitHub Release with custom notes
        if: steps.notes.outputs.use_custom == 'true'
        uses: softprops/action-gh-release@v2
        with:
          body_path: docs/releases/${{ github.ref_name }}.md
          files: |
            release-assets/**/*.zip
            release-assets/**/*.tar.gz
            release-assets/**/*.dmg
            release-assets/**/*.sig
            release-assets/**/*.exe
            release-assets/**/*.msi
            release-assets/**/*.AppImage
            release-assets/**/*.deb
            release-assets/**/*.rpm
            release-assets/SHA256SUMS.txt
            release-assets/latest.json

      - name: Publish GitHub Release with generated notes
        if: steps.notes.outputs.use_custom != 'true'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/**/*.zip
            release-assets/**/*.tar.gz
            release-assets/**/*.dmg
            release-assets/**/*.sig
            release-assets/**/*.exe
            release-assets/**/*.msi
            release-assets/**/*.AppImage
            release-assets/**/*.deb
            release-assets/**/*.rpm
            release-assets/SHA256SUMS.txt
            release-assets/latest.json
