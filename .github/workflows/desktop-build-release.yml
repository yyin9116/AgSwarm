name: agswarm-desktop-release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            target: windows-x64
          - os: macos-15
            target: macos-apple-silicon
    runs-on: ${{ matrix.os }}
    env:
      APP_NAME: AgSwarm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[desktop,nats,desktop-build]"

      - name: Install create-dmg (macOS)
        if: runner.os == 'macOS'
        run: brew install create-dmg

      - name: Prepare icon compatibility path
        shell: python
        run: |
          from pathlib import Path
          import shutil
          root = Path(".").resolve()
          src = root / "assets" / "icons" / "app-icon.png"
          dst = root / "prototype" / "assets" / "agswarm-icon.png"
          if src.exists():
            dst.parent.mkdir(parents=True, exist_ok=True)
            shutil.copyfile(src, dst)
            print(f"icon-compat: {src} -> {dst}")
          else:
            print(f"icon-compat: source icon missing, skip copy: {src}")

      - name: Build desktop package (Windows zip)
        if: runner.os == 'Windows'
        run: python scripts/build_desktop.py --clean --name ${{ env.APP_NAME }}

      - name: Build desktop package (macOS arm64 dmg only)
        if: runner.os == 'macOS'
        run: python scripts/build_desktop.py --clean --name ${{ env.APP_NAME }} --dmg --no-zip

      - name: Generate checksums (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $out = "dist-artifacts/SHA256SUMS.txt"
          Remove-Item $out -ErrorAction SilentlyContinue
          Get-ChildItem dist-artifacts -File | ForEach-Object {
            $hash = Get-FileHash $_.FullName -Algorithm SHA256
            "$($hash.Hash.ToLower())  $($_.Name)" | Out-File -FilePath $out -Encoding utf8 -Append
          }

      - name: Generate checksums (macOS)
        if: runner.os == 'macOS'
        run: |
          cd dist-artifacts
          shasum -a 256 * > SHA256SUMS.txt

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ matrix.os }}
          path: |
            dist-artifacts/*.zip
            dist-artifacts/*.dmg
            dist-artifacts/SHA256SUMS.txt
          if-no-files-found: error

  release:
    name: Publish Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for release notes)
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Display assets
        run: ls -R release-assets

      - name: Prepare release notes body
        id: notes
        shell: bash
        run: |
          NOTES_FILE="docs/releases/${GITHUB_REF_NAME}.md"
          if [[ -f "${NOTES_FILE}" ]]; then
            echo "use_custom=true" >> "$GITHUB_OUTPUT"
            {
              echo "body<<'EOF'"
              cat "${NOTES_FILE}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "use_custom=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub Release (custom notes)
        if: steps.notes.outputs.use_custom == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/**/*.zip
            release-assets/**/*.dmg
          body: ${{ steps.notes.outputs.body }}

      - name: Publish GitHub Release (auto notes)
        if: steps.notes.outputs.use_custom != 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/**/*.zip
            release-assets/**/*.dmg
          generate_release_notes: true
